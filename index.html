                    while (i < canonical.length) {
                        const nc = canonical[i];
                        if (nc === '(' || nc === ')' || nc === '=' || nc === '#' || nc === '@' || nc === '+' || nc === '-') {
                            if (nc === '(') {
                                // Copy the rest of the branch
                                let depth = 1;
                                result.push(nc);
                                i++;
                                while (depth > 0 && i < canonical.length) {
                                    const cc = canonical[i];
                                    result.push(cc);
                                    if (cc === '(') depth++;
                                    else if (cc === ')') depth--;
                                    i++;
                                }
                            } else if (nc === ')') {
                                i++;
                                break;
                            } else {
                                result.push(nc);
                                i++;
                            }
                        } else if (nc === 'C' || nc === 'N' || nc === 'O' || nc === 'S' || nc === 'P' || nc === '[' || (nc >= '0' && nc <= '9')) {
                            // Next atom starts, stop
                            break;
                        } else {
                            i++;
                        }
                    }
                    continue;
                } else {
                    result.push(c);
                    carbonCount++;
                    i++;
                }
            } else {
                result.push(c);
                if (c === 'C' && !isRingDigit(canonical, i)) {
                    carbonCount++;
                }
                i++;
            }
        }

        return result.join('');
    }

    function isInRingClosure(smiles, idx) {
        if (idx >= smiles.length) return false;
        // Check if previous char or next char is a digit (ring closure)
        if (idx > 0 && smiles[idx-1] >= '0' && smiles[idx-1] <= '9') return true;
        // Look ahead for ring digit
        let j = idx + 1;
        while (j < smiles.length && (smiles[j] >= '0' && smiles[j] <= '9')) j++;
        return j > idx + 1;
    }

    function isRingDigit(smiles, idx) {
        return idx < smiles.length && smiles[idx] >= '0' && smiles[idx] <= '9';
    }

    function generateBruteForceSMILES(baseSMILES, substAtomIdxs, chiralMarkers, halogen, RDKit) {
        // Fallback: generate all possibilities and pick the right one
        // For substituted alkanes, construct simple pattern

        const mol = RDKit.get_mol(baseSMILES);
        if (!mol) return null;
        const numAtoms = mol.get_num_atoms();
        mol.delete();

        // Get all carbon positions
        const carbons = getCarbonPositionsInSMILES(baseSMILES, RDKit);
        if (carbons.length === 0 || substAtomIdxs.length > carbons.length) {
            return `[${halogen}][C@](${baseSMILES})`;
        }

        // Pick the carbons to substitute
        const targets = substAtomIdxs.map(i => carbons[Math.min(i, carbons.length - 1)]);

        // Build simple substituted SMILES
        return buildSimpleSubstitutedSMILES(baseSMILES, targets, chiralMarkers, halogen);
    }

    function getCarbonPositionsInSMILES(smiles, RDKit) {
        const mol = RDKit.get_mol(smiles);
        if (!mol) return [];

        const numAtoms = mol.get_num_atoms();
        const carbons = [];

        // Get molblock to find carbons
        const molblock = mol.get_molblock();
        mol.delete();

        // Parse atom block for carbon indices
        const atomMap = parseAtomMapping(molblock, numAtoms);
        return atomMap.filter(a => a.element === 'C').map(a => a.originalIdx);
    }

    function parseAtomMapping(molblock, numAtoms) {
        const atoms = [];
        const lines = molblock.split('\n');
        let inAtoms = false;

        for (const line of lines) {
            if (line.includes('BEGIN ATOM')) { inAtoms = true; continue; }
            if (line.includes('END ATOM')) { inAtoms = false; continue; }
            if (inAtoms) {
                // M  V30 1 C -2.500 0.000 0.000 0
                const match = line.match(/M\s+V30\s+(\d+)\s+(\S+)/);
                if (match) {
                    atoms.push({ originalIdx: parseInt(match[1]) - 1, element: match[2] });
                }
            }
        }
        return atoms;
    }

    function buildSimpleSubstitutedSMILES(baseSMILES, targets, chiralMarkers, halogen) {
        // Simple approach: substitute specific carbons with chiral versions
        let result = baseSMILES;

        for (let i = targets.length - 1; i >= 0; i--) {
            const pos = targets[i];
            const marker = chiralMarkers[i];
            const replacement = `[C${marker}](${halogen})`;

            // Find the pos-th carbon and replace it
            let count = 0;
            let newResult = '';
            for (let j = 0; j < result.length; j++) {
                if (result[j] === 'C' && (j === 0 || (!isAlphNum(result[j-1]) && result[j-1] !== '%'))) {
                    if (count === pos) {
                        // Check if it's not a ring digit
                        if (!(j + 1 < result.length && result[j+1] >= '0' && result[j+1] <= '9')) {
                            newResult += replacement;
                            // Skip the original C and any following ring digits
                            j++;
                            while (j < result.length && result[j] >= '0' && result[j] <= '9') j++;
                            j--; // compensate for loop increment
                            count++;
                            continue;
                        }
                    }
                    count++;
                }
                newResult += result[j];
            }
            result = newResult;
        }

        return result;
    }

    function isAlphNum(c) {
        return (c >= 'a' && c <= 'z') || (c >= 'A' && c <= 'Z') || (c >= '0' && c <= '9');
    }

    // ================================================================
    // MAIN CALCULATION
    // ================================================================
    async function startCalculation() {
        if (!RDKitModule) return;

        const rawSmiles = document.getElementById("smiles-input").value.trim();
        const numSub = parseInt(document.getElementById("x-input").value);
        const halogen = document.getElementById("halogen-input").value;

        if (!rawSmiles) { alert("Empty SMILES"); return; }
        if (isNaN(numSub) || numSub < 1) { alert("Invalid X"); return; }

        // Validate input molecule
        const parentMol = RDKitModule.get_mol(rawSmiles);
        if (!parentMol) { alert("Invalid SMILES structure."); return; }

        // Dynamically extract carbon count
        let carbonIdxList = [];
        try {
            const raw = parentMol.get_substruct_matches("[#6]");
            if (raw !== null && raw !== undefined && raw !== '') {
                carbonIdxList = JSON.parse(raw);
            }
        } catch (e) {
            // Fallback: parse molblock to find carbon atom indices
        }

        // Fallback: if still empty, use molblock parsing
        if (carbonIdxList.length === 0) {
            try {
                const molblock = parentMol.get_molblock();
                const lines = molblock.split('\n');
                let atomIdx = 0;
                for (const line of lines) {
                    if (line.includes('BEGIN ATOM')) { atomIdx = 0; continue; }
                    if (line.includes('END ATOM')) break;
                    const atomMatch = line.match(/M\s+V30\s+(\d+)\s+(\S+)/);
                    if (atomMatch && atomMatch[2] === 'C') {
                        carbonIdxList.push(atomIdx);
                    }
                    if (atomMatch) atomIdx++;
                }
            } catch (e2) {
                // fallback: count C in SMILES string
            }
        }

        const carbonCount = carbonIdxList.length;

        if (carbonCount === 0) {
            logToConsole("ERROR: Could not detect carbon atoms. Please check your SMILES input.");
            parentMol.delete();
            return;
        }

        document.getElementById("carbon-count").textContent = carbonCount;

        // Enumerate all combinations of carbon positions for substitution
        const combos = Array.from(getCombinations(carbonIdxList, numSub));
        const totalCombos = combos.length;

        logToConsole(`Input SMILES: ${rawSmiles}`);
        logToConsole(`Detected Carbons: ${carbonCount} | Substitutions: ${numSub} x ${halogen}`);
        logToConsole(`${"=".repeat(60)}`);
        logToConsole(`Total position combinations: ${totalCombos}`);
        logToConsole(`Calculating...`);

        const uniqueInChIs = new Set();
        const finalResultsList = [];

        const progressBar = document.getElementById("progress-bar");
        const progressLabel = document.getElementById("progress-label");
        const chunkSize = Math.max(1, Math.floor(totalCombos / 100));

        let processed = 0;

        for (const combo of combos) {
            // For each position combination, enumerate all stereochemistry configurations
            const numCenters = combo.length;
            const totalStereo = Math.pow(2, numCenters);

            for (let s = 0; s < totalStereo; s++) {
                // Build chiral SMILES for this configuration
                const chiralMarkers = [];
                for (let m = 0; m < numCenters; m++) {
                    chiralMarkers.push((s & (1 << m)) ? '@@' : '@');
                }

                // Generate substituted SMILES
                const subSMILES = generateSubstitutedSMILES(rawSmILES, combo, chiralMarkers, halogen);
                if (!subSMILES) continue;

                // Validate with RDKit
                const mol = RDKitModule.get_mol(subSMILES);
                if (!mol) continue;

                // Get canonical form
                const canonSmiles = mol.get_canonical_smiles();
                const inchi = getInChI(RDKitModule, mol);

                mol.delete();

                if (!inchi) continue;

                if (!uniqueInChIs.has(inchi)) {
                    uniqueInChIs.add(inchi);
                    finalResultsList.push({
                        inchi: inchi,
                        smiles: canonSmiles || subSMILES
                    });
                }
            }

            processed++;
            if (processed % chunkSize === 0 || processed === totalCombos) {
                const percent = Math.round((processed / totalCombos) * 100);
                progressBar.value = percent;
                progressLabel.textContent = `${percent}%`;
                updateStreamingStatus(`Position ${processed}/${totalCombos} | Unique found: ${uniqueInChIs.size}`);
                await new Promise(resolve => setTimeout(resolve, 0));
            }
        }

        progressBar.value = 100;
        progressLabel.textContent = "100%";

        logToConsole(`\n${"-".repeat(60)}`);
        logToConsole(`Calculation complete!`);
        logToConsole(`Total unique stereoisomers: ${finalResultsList.length}`);
        logToConsole(`${"-".repeat(60)}\n`);

        // Output results
        let output = "";
        finalResultsList.forEach((item, idx) => {
            output += `#${(idx+1).toString().padEnd(4)} | InChI: ${item.inchi}\n     | SMILES: ${item.smiles}\n`;
        });
        logToConsole(output, true);

        document.getElementById("calc-btn").disabled = false;
        parentMol.delete();
    }

    function generateSubstitutedSMILES(baseSMILES, substIdxs, chiralMarkers, halogen) {
        // Build a substituted SMILES string
        // Strategy: find carbons at substIdxs and replace with chiral versions

        const mol = RDKitModule.get_mol(baseSMILES);
        if (!mol) return null;

        const molblock = mol.get_molblock();
        const numAtoms = mol.get_num_atoms();
        mol.delete();

        // Get canonical ordering
        const canonMol = RDKitModule.get_mol(baseSMILES);
        if (!canonMol) return null;
        const canonical = canonMol.get_canonical_smiles();
        canonMol.delete();

        // Map substIdxs to canonical positions
        // Since substIdxs come from get_substruct_matches("[#6]"), they are already in canonical order
        const targetSet = new Set(substIdxs);

        // Build substituted SMILES
        let result = '';
        let cIdx = 0;
        let subIdx = 0;

        const chars = canonical.split('');

        for (let i = 0; i < chars.length; i++) {
            const c = chars[i];

            // Check if this is a carbon that we're substituting
            // (not in a ring closure position)
            if (c === 'C') {
                // Check if it's a ring digit (don't substitute ring closure markers)
                const isRing = (i > 0 && chars[i-1] >= '0' && chars[i-1] <= '9');

                // Also check next char for ring
                const nextIsDigit = (i + 1 < chars.length && chars[i+1] >= '0' && chars[i+1] <= '9');

                if (!isRing && !nextIsDigit && targetSet.has(cIdx)) {
                    const marker = chiralMarkers[subIdx++];
                    result += `[C${marker}](${halogen})`;
                    // Skip the C and any following ring digits
                    i++;
                    while (i < chars.length && chars[i] >= '0' && chars[i] <= '9') i++;
                    i--; // compensate
                    cIdx++;
                    continue;
                } else {
                    if (!isRing) cIdx++;
                    result += c;
                }
            } else {
                result += c;
            }
        }

        // Verify the result is valid
        const testMol = RDKitModule.get_mol(result);
        if (testMol) {
            testMol.delete();
            return result;
        }

        // If invalid, try simpler approach
        return buildSimpleSubSMILES(baseSMILES, substIdxs, chiralMarkers, halogen);
    }

    function buildSimpleSubSMILES(baseSMILES, substIdxs, chiralMarkers, halogen) {
        // Get carbon positions in the molecule
        const mol = RDKitModule.get_mol(baseSMILES);
        if (!mol) return null;

        const canonical = mol.get_canonical_smiles();
        const molblock = mol.get_molblock();
        mol.delete();

        // Find all carbon positions in canonical SMILES
        const carbonPositions = [];
        let cCount = 0;
        for (let i = 0; i < canonical.length; i++) {
            if (canonical[i] === 'C') {
                // Check not ring
                const prevIsDigit = i > 0 && canonical[i-1] >= '0' && canonical[i-1] <= '9';
                const nextIsDigit = i + 1 < canonical.length && canonical[i+1] >= '0' && canonical[i+1] <= '9';
                if (!prevIsDigit && !nextIsDigit) {
                    carbonPositions.push(i);
                    cCount++;
                }
            }
        }

        // Map substIdxs to positions in canonical SMILES
        const targets = substIdxs.map(idx => carbonPositions[idx]).filter(x => x !== undefined);

        if (targets.length !== substIdxs.length) {
            // Fallback: use positions 0, 1, 2... in carbonPositions
            targets.length = 0;
            for (let i = 0; i < substIdxs.length && i < carbonPositions.length; i++) {
                targets.push(carbonPositions[i]);
            }
        }

        // Build result
        let result = canonical;
        const sortedTargets = targets.sort((a, b) => b - a); // Reverse order for replacement

        for (let i = 0; i < sortedTargets.length; i++) {
            const pos = sortedTargets[i];
            const marker = chiralMarkers[i];
            const replacement = `[C${marker}](${halogen})`;

            // Find the carbon at this position and replace it
            let cCount = 0;
            let newResult = '';
            let replaced = false;

            for (let j = 0; j < result.length; j++) {
                if (result[j] === 'C' && !replaced) {
                    // Check not ring
                    const prevIsDigit = j > 0 && result[j-1] >= '0' && result[j-1] <= '9';
                    const nextIsDigit = j + 1 < result.length && result[j+1] >= '0' && result[j+1] <= '9';

                    if (!prevIsDigit && !nextIsDigit) {
                        if (cCount === i) {
                            newResult += replacement;
                            // Skip original C and following ring digits
                            j++;
                            while (j < result.length && result[j] >= '0' && result[j] <= '9') j++;
                            j--;
                            replaced = true;
                            cCount++;
                            continue;
                        }
                        cCount++;
                    }
                }
                newResult += result[j];
            }

            result = newResult;
        }

        // Verify
        const test = RDKitModule.get_mol(result);
        if (test) {
            test.delete();
            return result;
        }

        return `[${halogen}][C@](${baseSMILES})`; // Fallback
    }

    function getInChI(RDKit, mol) {
        try {
            // Try get_inchi first (may not be available in minimal build)
            if (typeof mol.get_inchi === 'function') {
                return mol.get_inchi();
            }
            // Fallback: get canonical SMILES and use as identifier
            return mol.get_canonical_smiles();
        } catch (e) {
            return mol.get_canonical_smiles();
        }
    }

    // Make getCombinations available
    window.getCombinations = getCombinations;
</script>
