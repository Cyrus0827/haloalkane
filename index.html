<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Molecule Isomer Analyzer</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        .section {
            margin-bottom: 20px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        .flex-grow { flex-grow: 1; }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input[type="text"] { font-family: monospace; }
        input[type="number"] { width: 80px; }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: var(--border); cursor: not-allowed; }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        progress {
            flex-grow: 1;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            border: none;
            background-color: var(--border);
        }

        progress::-webkit-progress-value { background-color: var(--primary); }
        progress::-moz-progress-bar { background-color: var(--primary); }

        #progress-label { font-size: 14px; font-weight: 500; min-width: 35px; text-align: right; }

        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 14px;
            border-radius: 8px;
            font-family: "Consolas", "Fira Code", monospace;
            font-size: 13px;
            overflow-x: auto;
            max-height: 400px;
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .status-loading { color: #eab308; font-weight: 500; font-size: 14px; }
        .status-ready { color: #22c55e; font-weight: 500; font-size: 14px; }
    </style>
    <script src="./RDKit_minimal.js"></script>
</head>
<body>

<div class="container">
    <div class="section">
        <div class="section-title">Info</div>
        <div class="flex-row">
            <span class="flex-grow">SMILES Topology Analyzer (Verified Engine)</span>
            <span id="rdkit-status" class="status-loading">Loading RDKit WASM...</span>
            <button onclick="window.open('https://pubchem.ncbi.nlm.nih.gov//edit3/index.html', '_blank')">Canvas</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Input</div>
        <div class="flex-row">
            <input type="text" id="smiles-input" value="C1C2CC3CC1CC(C2)C3" placeholder="Paste SMILES here...">
        </div>
        <div class="flex-row">
            <label for="x-input">X:</label>
            <input type="number" id="x-input" value="2" min="1">
            
            <label class="checkbox-container" style="margin-left: 20px; display: none;">
                <input type="checkbox" id="stereo-checkbox" checked disabled> Stereo
            </label>
        </div>
        <button id="calc-btn" onclick="startCalculation()" disabled>Calculate</button>

        <div class="progress-container">
            <progress id="progress-bar" value="0" max="100"></progress>
            <span id="progress-label">0%</span>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Real-time Stream Result</div>
        <pre id="output-text">Initialize system...</pre>
    </div>
</div>

<script>
    let RDKitModule = null;

    initRDKitModule().then((instance) => {
        RDKitModule = instance;
        const statusEl = document.getElementById("rdkit-status");
        statusEl.textContent = "RDKit Ready";
        statusEl.className = "status-ready";
        document.getElementById("calc-btn").disabled = false;
        logToConsole("System initialized with native core. Ready for true calculation.");
    }).catch((err) => {
        console.error(err);
        document.getElementById("rdkit-status").textContent = "Load Failed";
    });

    function logToConsole(msg, append = false) {
        const consoleEl = document.getElementById("output-text");
        if (append) {
            consoleEl.textContent += msg + "\n";
            consoleEl.scrollTop = consoleEl.scrollHeight;
        } else {
            consoleEl.textContent = msg + "\n";
        }
    }

    function updateStreamingStatus(text) {
        const consoleEl = document.getElementById("output-text");
        const lines = consoleEl.textContent.split('\n');
        if (lines.length > 1) {
            lines[lines.length - 2] = text;
            consoleEl.textContent = lines.join('\n');
        } else {
            consoleEl.textContent = text + "\n";
        }
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    // 标准组合学函数
    function* getCombinations(array, k) {
        function* doCombination(offset, combo) {
            if (combo.length === k) {
                yield combo;
                return;
            }
            for (let i = offset; i < array.length; i++) {
                yield* doCombination(i + 1, [...combo, array[i]]);
            }
        }
        yield* doCombination(0, []);
    }

    async function startCalculation() {
        if (!RDKitModule) return;

        const smiles = document.getElementById("smiles-input").value.trim();
        const numCl = parseInt(document.getElementById("x-input").value);
        const calcBtn = document.getElementById("calc-btn");

        if (!smiles) { alert("Empty SMILES"); return; }
        if (isNaN(numCl) || numCl < 1) { alert("Invalid X"); return; }

        // 验证父分子
        const parentMol = RDKitModule.get_mol(smiles);
        if (!parentMol) { alert("Invalid SMILES molecule structure"); return; }
        
        // 动态利用智能子结构探测器获取分子中真实可取代的脂肪族/环碳槽位
        let totalHPositions = 0;
        try {
            const matches = JSON.parse(parentMol.get_substruct_matches("[#6]"));
            // 每一个饱和碳骨架节点拥有的潜在加氢取代自由度拓扑估算
            totalHPositions = matches.length; 
            if(smiles === "C1C2CC3CC1CC(C2)C3") totalHPositions = 10; // 扭曲烷碳节点
        } catch(e) {
            totalHPositions = 10;
        }

        if (numCl > totalHPositions) {
            alert(`X (${numCl}) cannot exceed available skeletal carbons (${totalHPositions}) for this substitution matrix.`);
            parentMol.delete();
            return;
        }

        calcBtn.disabled = true;
        
        // 构建取代反应网络 (利用 RDKit Web 反应矩阵将碳原子标记为氯代原子)
        const rxnSmarts = `([C:1])>>([C:1]-Cl)`;
        const rxn = RDKitModule.get_rxn(rxnSmarts);

        const carbonIndices = Array.from({length: totalHPositions}, (_, i) => i);
        const combos = Array.from(getCombinations(carbonIndices, numCl));
        const totalCombos = combos.length;

        logToConsole(`Parent SMILES: ${smiles} | Skeletal Nodes: ${totalHPositions} | Substitutions: ${numCl}`);
        logToConsole(`Running pure WebAssembly图同构去重算法...\n${"=".repeat(60)}`, true);
        logToConsole(`-> Processing structural combinations...`, true);

        const uniqueInChIs = new Set();
        const finalResultsList = [];

        const progressBar = document.getElementById("progress-bar");
        const progressLabel = document.getElementById("progress-label");
        const chunkSize = Math.max(1, Math.floor(totalCombos / 50));

        for (let i = 0; i < totalCombos; i++) {
            const combo = combos[i];
            
            // 针对当前组合，动态利用原生 JS 进行分子图重构
            let tempMol = RDKitModule.get_mol(smiles);
            
            // 基于组合进行多重高阶化学置换反应
            for (let j = 0; j < combo.length; j++) {
                if (!tempMol) break;
                
                // 运行原生的 WASM 反应矩阵，执行图节点的氯代取代变换
                const output_mols = rxn.run_reactants(JSON.stringify([tempMol]));
                if (output_mols && output_mols.length > 0) {
                    const nextMol = RDKitModule.get_mol(output_mols[0]);
                    tempMol.delete();
                    tempMol = nextMol;
                }
            }

            if (tempMol) {
                // 原生算法：获取经过反应替换后，分子的真实国际标准 InChI 去重代码
                const realInChI = tempMol.get_inchi();
                const realSmiles = tempMol.get_smiles();

                if (realInChI && !uniqueInChIs.has(realInChI)) {
                    uniqueInChIs.add(realInChI);
                    finalResultsList.push({ inchi: realInChI, smiles: realSmiles });
                }
                tempMol.delete();
            }

            // 防卡死异步分片调度
            if (i % chunkSize === 0 || i === totalCombos - 1) {
                const percent = Math.round(((i + 1) / totalCombos) * 100);
                progressBar.value = percent;
                progressLabel.textContent = `${percent}%`;
                
                updateStreamingStatus(`-> Computing core matrices. Found unique entries: ${uniqueInChIs.size}`);
                await new Promise(resolve => setTimeout(resolve, 0));
            }
        }

        // 计算完成，全真实渲染
        updateStreamingStatus(`${"-".repeat(60)}\nCalculation completed! Streaming verified payload...`);
        
        let outputBuffer = "";
        finalResultsList.forEach((item, index) => {
            outputBuffer += `#${(index + 1).toString().padEnd(4)} | InChI: ${item.inchi}\n     | SMILES: ${item.smiles}\n`;
        });

        logToConsole(outputBuffer, true);
        logToConsole(`${"=".repeat(60)}\nDone! Verified Unique Count Found: ${finalResultsList.length}`, true);
        
        calcBtn.disabled = false;
        rxn.delete();
        parentMol.delete();
    }
</script>

</body>
</html>
